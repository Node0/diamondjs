<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiamondJS v2.0</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 720px;
      margin: 50px auto;
      padding: 20px;
      color: #1f2937;
    }
    h1 { color: #2563eb; }
    .card {
      margin: 20px 0;
      padding: 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .card h2 { margin-top: 0; font-size: 1.1rem; }
    .banner {
      margin: 8px 0 16px;
      padding: 10px 12px;
      background: #eff6ff;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .banner code { background: #dbeafe; padding: 1px 4px; border-radius: 3px; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input {
      flex: 1;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }
    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
    }
    button:hover { background: #f1f5f9; }
    ul { list-style: none; padding: 0; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .empty { color: #64748b; font-style: italic; }
    .count { color: #64748b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>DiamondJS v2.0</h1>
  <p>All five phases in two reactive components.</p>

  <div id="app"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
